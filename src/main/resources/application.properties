spring.application.name=api-gateway

# Server Port
server.port=${PORT:8080}

# Eureka Discovery Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# Instance Identity
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}

# --- Gateway Routing Configuration ---

# 1. Disable default discovery locator
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

# 2. Explicit route for Auth Service (Index 0)
spring.cloud.gateway.server.webflux.routes[0].id=auth-service-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

# 3. Explicit route for Complaint Service (Index 1)
spring.cloud.gateway.server.webflux.routes[1].id=complaint-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://COMPLAINT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/complaints/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/complaints/(?<segment>.*), /api/complaints/$\\{segment}

# 4. Explicit route for Library Service (Index 2)
spring.cloud.gateway.server.webflux.routes[2].id=library-service-route
spring.cloud.gateway.server.webflux.routes[2].uri=lb://LIBRARY-MANAGEMENT
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/library/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/library/(?<segment>.*), /api/$\\{segment}

# Management Endpoints
management.endpoints.web.exposure.include=*

# --- Gateway CORS Configuration ---
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true

# Deduplicate CORS response headers from downstream services
spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
spring.cloud.gateway.server.webflux.default-filters[1]=AuthenticationFilter
