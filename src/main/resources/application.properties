spring.application.name=api-gateway

# Server Port
server.port=${PORT:8080}

# Eureka Discovery Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# Instance Identity
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}

# --- Gateway Routing Configuration ---

# 1. Disable default discovery locator
spring.cloud.gateway.discovery.locator.enabled=false

# 2. Explicit route for Auth Service (Index 0)
spring.cloud.gateway.routes[0].id=auth-service-route
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 3. Explicit route for Complaint Service (Index 1)
spring.cloud.gateway.routes[1].id=complaint-service-route
# Points to the spring.application.name value registered in Eureka
spring.cloud.gateway.routes[1].uri=lb://COMPLAINT-SERVICE
# Captures any incoming requests starting with /complaints/
spring.cloud.gateway.routes[1].predicates[0]=Path=/complaints/**
# Transforms /complaints/xyz into /api/complaints/xyz to match your controller
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/complaints/(?<segment>.*), /api/complaints/$\\{segment}

# 4. Explicit route for Leave Service (Index 2)
spring.cloud.gateway.routes[2].id=leave-service-route
spring.cloud.gateway.routes[2].uri=lb://leave-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/leaves/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/leaves/(?<segment>.*), /leave/$\\{segment}

# 5. Explicit route for Library Service (Index 3)
spring.cloud.gateway.routes[3].id=library-service-route
spring.cloud.gateway.routes[3].uri=lb://LIBRARY-MANAGEMENT
spring.cloud.gateway.routes[3].predicates[0]=Path=/library/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/library/(?<segment>.*), /api/$\\{segment}

# Management Endpoints
management.endpoints.web.exposure.include=*

# --- Gateway CORS Configuration ---
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# Deduplicate CORS response headers from downstream services
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
spring.cloud.gateway.default-filters[1]=AuthenticationFilter
