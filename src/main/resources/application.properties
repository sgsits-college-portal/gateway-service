spring.application.name=api-gateway

# Server Port
server.port=${PORT:8080}

# Eureka Discovery Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# Instance Identity
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}

# --- Gateway Routing Configuration ---

# 1. Disable default discovery locator
spring.cloud.gateway.discovery.locator.enabled=false

# 2. Explicit route for Auth Service
spring.cloud.gateway.routes[0].id=auth-service-route
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# 3. Path Rewrite
# This rewrites the incoming Gateway path (/auth/...) to match the Controller path (/api/auth/...)
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/auth/(?<segment>.*), /api/auth/$\\{segment}

# Management Endpoints
management.endpoints.web.exposure.include=*
